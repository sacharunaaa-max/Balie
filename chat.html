<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALIE Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b141a;
    color: #e9edef;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: #202c33;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #2a3942;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 16px;
    font-weight: 600;
    flex: 1;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .status-dot.online { background: #00a884; box-shadow: 0 0 6px #00a88488; }
  .status-dot.offline { background: #ef5350; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #0b141a;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
    position: relative;
  }
  .msg .time {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    text-align: right;
  }
  .msg.user {
    align-self: flex-end;
    background: #005c4b;
    border-radius: 8px 2px 8px 8px;
  }
  .msg.user .time { color: rgba(255,255,255,0.5); }
  .msg.bot {
    align-self: flex-start;
    background: #202c33;
    border-radius: 2px 8px 8px 8px;
  }
  .msg.bot .time { color: rgba(255,255,255,0.4); }
  .msg.pending {
    opacity: 0.6;
  }
  .sep-date {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin: 8px 0;
  }
  #input-area {
    background: #202c33;
    padding: 10px 12px;
    display: flex;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #input-area textarea {
    flex: 1;
    background: #2a3942;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e9edef;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    outline: none;
    line-height: 1.4;
  }
  #input-area textarea::placeholder { color: #8696a0; }
  #input-area .btn {
    border: none;
    border-radius: 50%;
    width: 40px; height: 40px;
    color: #8696a0;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    background: transparent;
  }
  #input-area .btn:hover { background: #2a3942; color: #e9edef; }
  #input-area .btn.send {
    background: #00a884;
    color: #fff;
  }
  #input-area .btn.send:hover { background: #06cf9c; color: #fff; }
  #input-area .btn.send:disabled {
    background: #2a3942;
    color: #8696a0;
    cursor: not-allowed;
  }
  /* Archivos adjuntos */
  .msg .file-attachment {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    padding: 8px 10px;
    margin: 4px 0;
    cursor: pointer;
  }
  .msg .file-attachment .icon {
    font-size: 28px;
    flex-shrink: 0;
  }
  .msg .file-attachment .info {
    flex: 1;
    min-width: 0;
  }
  .msg .file-attachment .info .name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .msg .file-attachment .info .size {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }
  .msg .file-attachment img.thumb {
    width: 48px;
    height: 48px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }
  #reconnect-bar {
    display: none;
    background: #ef5350;
    color: #fff;
    text-align: center;
    padding: 6px;
    font-size: 13px;
    flex-shrink: 0;
  }
  #reconnect-bar.visible { display: block; }
  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <span class="status-dot offline" id="statusDot"></span>
  <h1>BALIE Chat</h1>
  <span id="statusText" style="font-size:12px;color:#8696a0;">conectando...</span>
</div>
<div id="reconnect-bar">🔴 Sin conexión — reintentando...</div>
<div id="messages"></div>
<div id="input-area">
  <button class="btn" id="attachBtn" title="Adjuntar archivo">📎</button>
  <input type="file" id="fileInput" style="display:none" multiple>
  <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje..." enterkeyhint="send"></textarea>
  <button class="btn send" id="sendBtn" disabled>➤</button>
</div>

<script>
// ─── Config ──────────────────────────────────────────────
const TUNNEL_URL = 'https://docs-response-entrepreneurs-candy.trycloudflare.com';
const POLL_INTERVAL = 2500; // ms
// ─────────────────────────────────────────────────────────

const msgContainer = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const reconnectBar = document.getElementById('reconnect-bar');

let lastSeenId = parseInt(localStorage.getItem('balieChatLastId') || '0', 10);
let connected = false;
let pollTimer = null;
let sending = false;

// ─── Auto-resize textarea ───────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  sendBtn.disabled = !msgInput.value.trim();
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ─── Render ─────────────────────────────────────────────
function msgTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function msgDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  
  if (d.toDateString() === today.toDateString()) return 'Hoy';
  if (d.toDateString() === yesterday.toDateString()) return 'Ayer';
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderMessages(messages, append = true) {
  if (!messages || messages.length === 0) return;

  if (!append) {
    msgContainer.innerHTML = '';
  }

  // Show date separator for first message
  let lastDate = null;

  messages.forEach(msg => {
    const msgDateStr = msgDate(msg.ts);
    if (msgDateStr !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'sep-date';
      sep.textContent = msgDateStr;
      msgContainer.appendChild(sep);
      lastDate = msgDateStr;
    }

    const div = document.createElement('div');
    div.className = `msg ${msg.from}`;
    
    // Si es un archivo, mostrar attachment
    if (msg.type === 'file') {
      const fileInfo = msg.file || {};
      const fileName = fileInfo.name || 'archivo';
      const fileSize = fileInfo.size || 0;
      const mime = fileInfo.mimeType || '';
      const isImage = mime.startsWith('image/');
      
      const attach = document.createElement('div');
      attach.className = 'file-attachment';
      
      if (isImage && fileInfo.path) {
        // Mostrar thumbnail para imágenes
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = `${TUNNEL_URL}/chat/files/${fileInfo.path}`;
        img.alt = fileName;
        img.loading = 'lazy';
        attach.appendChild(img);
      } else {
        const icon = document.createElement('span');
        icon.className = 'icon';
        if (mime.startsWith('image/')) icon.textContent = '🖼️';
        else if (mime.includes('pdf')) icon.textContent = '📄';
        else if (mime.includes('spreadsheet') || mime.includes('excel')) icon.textContent = '📊';
        else if (mime.includes('word') || mime.includes('document')) icon.textContent = '📝';
        else if (mime.startsWith('video/')) icon.textContent = '🎬';
        else if (mime.startsWith('audio/')) icon.textContent = '🎵';
        else if (mime.includes('zip') || mime.includes('rar')) icon.textContent = '📦';
        else icon.textContent = '📎';
        attach.appendChild(icon);
      }
      
      const info = document.createElement('div');
      info.className = 'info';
      
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = fileName;
      info.appendChild(name);
      
      if (fileSize > 0) {
        const size = document.createElement('div');
        size.className = 'size';
        size.textContent = fileSize > 1024*1024
          ? `${(fileSize/1024/1024).toFixed(1)} MB`
          : `${Math.round(fileSize/1024)} KB`;
        info.appendChild(size);
      }
      
      attach.appendChild(info);
      div.appendChild(attach);
      
      // Click para descargar/abrir
      if (fileInfo.path) {
        attach.style.cursor = 'pointer';
        attach.title = 'Abrir archivo';
        attach.addEventListener('click', () => {
          window.open(`${TUNNEL_URL}/chat/files/${fileInfo.path}`, '_blank');
        });
      }
    } else {
      div.textContent = msg.text;
    }
    
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = msgTime(msg.ts);
    div.appendChild(time);
    
    msgContainer.appendChild(div);
  });

  msgContainer.scrollTop = msgContainer.scrollHeight;

  // Update lastSeenId
  const maxId = Math.max(...messages.map(m => m.id));
  if (maxId > lastSeenId) {
    lastSeenId = maxId;
    localStorage.setItem('balieChatLastId', String(lastSeenId));
  }
}

// ─── Poll ───────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch(`${TUNNEL_URL}/chat/poll?after=${lastSeenId}`, {
      signal: AbortSignal.timeout(5000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    setConnected(true);
    
    if (data.messages && data.messages.length > 0) {
      renderMessages(data.messages);
    }
    
    return data.messages;
  } catch (e) {
    setConnected(false);
    return [];
  }
}

function setConnected(on) {
  if (on === connected) return;
  connected = on;
  statusDot.className = `status-dot ${on ? 'online' : 'offline'}`;
  statusText.textContent = on ? 'conectado' : 'sin conexión';
  reconnectBar.classList.toggle('visible', !on);
}

// ─── Send ───────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;

  // Optimistic add
  const tempMsg = {
    id: -1,
    from: 'user',
    text: text,
    ts: new Date().toISOString()
  };
  renderMessages([tempMsg]);
  
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;

  try {
    const res = await fetch(`${TUNNEL_URL}/chat/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    // Replace optimistic with confirmed
    const lastMsg = msgContainer.lastChild;
    if (lastMsg && lastMsg.classList.contains('msg')) {
      lastMsg.remove();
    }
    
    const confirmedMsg = {
      id: data.id,
      from: 'user',
      text: text,
      ts: data.ts
    };
    renderMessages([confirmedMsg]);
  } catch (e) {
    setConnected(false);
    // Re-add the message as failed (keep optimistic)
    const failedMsgs = msgContainer.querySelectorAll('.msg.user:last-child');
    // Just show the error bar
    reconnectBar.classList.add('visible');
  }

  sending = false;
  if (msgInput.value.trim()) sendBtn.disabled = false;
}

// ─── Init ───────────────────────────────────────────────
async function init() {
  // Poll immediately, then start interval
  await poll();
  pollTimer = setInterval(poll, POLL_INTERVAL);
}

sendBtn.addEventListener('click', sendMessage);

// ─── File Upload ────────────────────────────────────────
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');
let uploading = false;

attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const files = e.target.files;
  if (!files || files.length === 0) return;
  
  for (const file of files) {
    if (uploading) break;
    await uploadFile(file);
  }
  
  fileInput.value = '';
});

async function uploadFile(file) {
  if (uploading) return;
  
  // Límite de 10 MB
  if (file.size > 10 * 1024 * 1024) {
    addStatusMsg(`⚠️ ${file.name} es demasiado grande (máx 10 MB)`);
    return;
  }
  
  uploading = true;
  
  // Mostrar estado de subida
  const tempMsg = {
    id: -1,
    from: 'user',
    type: 'file',
    text: `📎 ${file.name}`,
    file: { name: file.name, size: file.size, mimeType: file.type },
    ts: new Date().toISOString()
  };
  renderMessages([tempMsg]);
  const tempDiv = msgContainer.lastChild;
  if (tempDiv) tempDiv.classList.add('pending');
  
  try {
    // Leer archivo como base64
    const base64 = await fileToBase64(file);
    
    const res = await fetch(`${TUNNEL_URL}/chat/upload`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: file.name,
        mimeType: file.type,
        data: base64
      }),
      signal: AbortSignal.timeout(30000) // 30s para archivos grandes
    });
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    // Reemplazar mensaje temporal con confirmado
    if (tempDiv && tempDiv.parentNode) {
      tempDiv.remove();
    }
    
    const confirmedMsg = {
      id: data.id,
      from: 'user',
      type: 'file',
      text: `📎 ${file.name}`,
      file: { name: file.name, size: file.size, mimeType: file.type, path: data.fileName },
      ts: new Date().toISOString()
    };
    renderMessages([confirmedMsg]);
    
  } catch (e) {
    console.error('Upload error:', e);
    setConnected(false);
    reconnectBar.classList.add('visible');
    if (tempDiv) tempDiv.remove();
    addStatusMsg(`❌ Error al subir ${file.name}`);
  }
  
  uploading = false;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      // Quitar el prefijo data:...;base64,
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function addStatusMsg(text) {
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:rgba(255,255,255,0.5);padding:4px 0;';
  div.textContent = text;
  msgContainer.appendChild(div);
  setTimeout(() => { if (div.parentNode) div.remove(); }, 4000);
}

// Load initial messages

// ─── Load history on start ──────────────────────────────
(async function loadHistory() {
  try {
    const res = await fetch(`${TUNNEL_URL}/chat/poll?after=0`, {
      signal: AbortSignal.timeout(5000)
    });
    if (res.ok) {
      const data = await res.json();
      if (data.messages && data.messages.length > 0) {
        // Sort by id to render in order
        data.messages.sort((a, b) => a.id - b.id);
        renderMessages(data.messages, false);
        lastSeenId = Math.max(...data.messages.map(m => m.id));
        localStorage.setItem('balieChatLastId', String(lastSeenId));
      }
      setConnected(true);
    }
  } catch (e) {
    setConnected(false);
  }
})();

// Start polling
pollTimer = setInterval(poll, POLL_INTERVAL);

// ─── Register service worker for offline? No, keep simple ─

console.log('💬 BALIE Chat iniciado');
console.log(`🔗 Tunnel: ${TUNNEL_URL}`);

// ─── Keyboard shortcut hints ────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    msgInput.blur();
  }
});
</script>
</body>
</html>
