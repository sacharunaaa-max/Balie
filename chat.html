<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BALIE Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b141a;
    color: #e9edef;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: #202c33;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #2a3942;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 16px;
    font-weight: 600;
    flex: 1;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .status-dot.online { background: #00a884; box-shadow: 0 0 6px #00a88488; }
  .status-dot.offline { background: #ef5350; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #0b141a;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
    position: relative;
  }
  .msg .time {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    text-align: right;
  }
  .msg.user {
    align-self: flex-end;
    background: #005c4b;
    border-radius: 8px 2px 8px 8px;
  }
  .msg.user .time { color: rgba(255,255,255,0.5); }
  .msg.bot {
    align-self: flex-start;
    background: #202c33;
    border-radius: 2px 8px 8px 8px;
  }
  .msg.bot .time { color: rgba(255,255,255,0.4); }
  .msg.pending {
    opacity: 0.6;
  }
  .sep-date {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin: 8px 0;
  }
  #input-area {
    background: #202c33;
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #input-area textarea {
    flex: 1;
    background: #2a3942;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e9edef;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    outline: none;
    line-height: 1.4;
  }
  #input-area textarea::placeholder { color: #8696a0; }
  #input-area button {
    background: #00a884;
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #input-area button:hover { background: #06cf9c; }
  #input-area button:disabled {
    background: #2a3942;
    color: #8696a0;
    cursor: not-allowed;
  }
  #reconnect-bar {
    display: none;
    background: #ef5350;
    color: #fff;
    text-align: center;
    padding: 6px;
    font-size: 13px;
    flex-shrink: 0;
  }
  #reconnect-bar.visible { display: block; }
  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <span class="status-dot offline" id="statusDot"></span>
  <h1>BALIE Chat</h1>
  <span id="statusText" style="font-size:12px;color:#8696a0;">conectando...</span>
</div>
<div id="reconnect-bar">🔴 Sin conexión — reintentando...</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje..." enterkeyhint="send"></textarea>
  <button id="sendBtn" disabled>➤</button>
</div>

<script>
// ─── Config ──────────────────────────────────────────────
const TUNNEL_URL = 'https://docs-response-entrepreneurs-candy.trycloudflare.com';
const POLL_INTERVAL = 2500; // ms
// ─────────────────────────────────────────────────────────

const msgContainer = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const reconnectBar = document.getElementById('reconnect-bar');

let lastSeenId = parseInt(localStorage.getItem('balieChatLastId') || '0', 10);
let connected = false;
let pollTimer = null;
let sending = false;

// ─── Auto-resize textarea ───────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  sendBtn.disabled = !msgInput.value.trim();
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ─── Render ─────────────────────────────────────────────
function msgTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function msgDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  
  if (d.toDateString() === today.toDateString()) return 'Hoy';
  if (d.toDateString() === yesterday.toDateString()) return 'Ayer';
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderMessages(messages, append = true) {
  if (!messages || messages.length === 0) return;

  if (!append) {
    msgContainer.innerHTML = '';
  }

  // Show date separator for first message
  let lastDate = null;

  messages.forEach(msg => {
    const msgDateStr = msgDate(msg.ts);
    if (msgDateStr !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'sep-date';
      sep.textContent = msgDateStr;
      msgContainer.appendChild(sep);
      lastDate = msgDateStr;
    }

    const div = document.createElement('div');
    div.className = `msg ${msg.from}`;
    div.textContent = msg.text;
    
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = msgTime(msg.ts);
    div.appendChild(time);
    
    msgContainer.appendChild(div);
  });

  msgContainer.scrollTop = msgContainer.scrollHeight;

  // Update lastSeenId
  const maxId = Math.max(...messages.map(m => m.id));
  if (maxId > lastSeenId) {
    lastSeenId = maxId;
    localStorage.setItem('balieChatLastId', String(lastSeenId));
  }
}

// ─── Poll ───────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch(`${TUNNEL_URL}/chat/poll?after=${lastSeenId}`, {
      signal: AbortSignal.timeout(5000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    setConnected(true);
    
    if (data.messages && data.messages.length > 0) {
      renderMessages(data.messages);
    }
    
    return data.messages;
  } catch (e) {
    setConnected(false);
    return [];
  }
}

function setConnected(on) {
  if (on === connected) return;
  connected = on;
  statusDot.className = `status-dot ${on ? 'online' : 'offline'}`;
  statusText.textContent = on ? 'conectado' : 'sin conexión';
  reconnectBar.classList.toggle('visible', !on);
}

// ─── Send ───────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;

  // Optimistic add
  const tempMsg = {
    id: -1,
    from: 'user',
    text: text,
    ts: new Date().toISOString()
  };
  renderMessages([tempMsg]);
  
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;

  try {
    const res = await fetch(`${TUNNEL_URL}/chat/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    // Replace optimistic with confirmed
    const lastMsg = msgContainer.lastChild;
    if (lastMsg && lastMsg.classList.contains('msg')) {
      lastMsg.remove();
    }
    
    const confirmedMsg = {
      id: data.id,
      from: 'user',
      text: text,
      ts: data.ts
    };
    renderMessages([confirmedMsg]);
  } catch (e) {
    setConnected(false);
    // Re-add the message as failed (keep optimistic)
    const failedMsgs = msgContainer.querySelectorAll('.msg.user:last-child');
    // Just show the error bar
    reconnectBar.classList.add('visible');
  }

  sending = false;
  if (msgInput.value.trim()) sendBtn.disabled = false;
}

// ─── Init ───────────────────────────────────────────────
async function init() {
  // Poll immediately, then start interval
  await poll();
  pollTimer = setInterval(poll, POLL_INTERVAL);
}

sendBtn.addEventListener('click', sendMessage);

// Load initial messages (without date headers for existing)
// Actually, renderMessages already handles dates
// Just poll to get any existing messages

// ─── Load history on start ──────────────────────────────
(async function loadHistory() {
  try {
    const res = await fetch(`${TUNNEL_URL}/chat/poll?after=0`, {
      signal: AbortSignal.timeout(5000)
    });
    if (res.ok) {
      const data = await res.json();
      if (data.messages && data.messages.length > 0) {
        // Sort by id to render in order
        data.messages.sort((a, b) => a.id - b.id);
        renderMessages(data.messages, false);
        lastSeenId = Math.max(...data.messages.map(m => m.id));
        localStorage.setItem('balieChatLastId', String(lastSeenId));
      }
      setConnected(true);
    }
  } catch (e) {
    setConnected(false);
  }
})();

// Start polling
pollTimer = setInterval(poll, POLL_INTERVAL);

// ─── Register service worker for offline? No, keep simple ─

console.log('💬 BALIE Chat iniciado');
console.log(`🔗 Tunnel: ${TUNNEL_URL}`);

// ─── Keyboard shortcut hints ────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    msgInput.blur();
  }
});
</script>
</body>
</html>
